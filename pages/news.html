<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News | ABYSSEA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Rajdhani:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/style_versions.css">
    <link rel="stylesheet" href="../styles/style_news.css">
    <link rel="icon" type="image/svg+xml" href="../src/img/favicon/favicon.svg">
</head>

<body>
    <canvas id="bubbles-canvas"></canvas>

    <div class="news-page">
        <div class="container">
            <a href="../index.html" class="back-link" data-i18n="ver_back_btn">Volver al inicio</a>

            <header class="news-header reveal">
                <h1 class="section-heading font-glech" data-i18n="news_title">TRANSMISIONES DEL <span
                        class="accent">ABISMO</span></h1>
                <p class="section-sub" data-i18n="news_sub">Últimas actualizaciones, parches y novedades del desarrollo
                </p>
            </header>

            <div class="news-list reveal reveal-delay-1" id="news-list-container">
                <!-- Las noticias se inyectan dinámicamente aquí a través del script -->
            </div>

        </div>
    </div>

    <!-- Modal de Noticias -->
    <div class="news-modal-overlay" id="news-modal">
        <div class="news-modal-content">
            <button class="news-modal-close" id="news-modal-close">&times;</button>
            <div class="news-modal-body">
                <span class="news-modal-date" id="news-modal-date"></span>
                <h2 class="font-glech news-modal-title" id="news-modal-title"></h2>
                <div class="news-content-inner" id="news-modal-content"></div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../data/locales/common_locales.js"></script>
    <script src="../data/locales/news_locales.js"></script>

    <!-- =========================================================================
         INSTRUCCIONES PARA AÑADIR NOTICIAS:
         1. Crea un nuevo archivo en pages/news/ (ej: news_10-5-2026.js)
         2. Carga el archivo aquí abajo añadiendo una nueva etiqueta <script>
    ========================================================================= -->
    <script src="news/news_20-5-2026.js"></script>

    <script src="../scripts/scripts.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('news-list-container');
            const lang = localStorage.getItem('abyssea_lang') || (navigator.language.startsWith('es') ? 'es' : 'en');
            const locales = window.ABYSSEA_LOCALES[lang];

            const btnText = locales.news_read_more || 'LEER MÁS';
            const closeText = locales.news_close || 'CERRAR';

            // window.ABYSSEA_NEWS is populated by the loaded scripts
            const newsItems = window.ABYSSEA_NEWS || [];

            const newsModal = document.getElementById('news-modal');
            const newsModalClose = document.getElementById('news-modal-close');
            const modalDate = document.getElementById('news-modal-date');
            const modalTitle = document.getElementById('news-modal-title');
            const modalContent = document.getElementById('news-modal-content');

            // Render from newest to oldest
            newsItems.reverse().forEach(news => {
                const data = news.locales[lang] || news.locales['en'];

                const isVideo = news.image && (news.image.endsWith('.mp4') || news.image.endsWith('.mov') || news.image.endsWith('.webm'));
                const mediaTag = isVideo
                    ? `<video src="${news.image}" class="news-thumb" autoplay loop muted playsinline style="object-fit: cover; width: 100%; height: 100%;"></video>`
                    : `<img src="${news.image}" alt="News Image" class="news-thumb">`;

                const card = document.createElement('div');
                card.className = 'news-card';
                card.innerHTML = `
                    <div class="news-summary">
                        <div class="news-thumb-wrapper">
                            ${mediaTag}
                        </div>
                        <div class="news-excerpt">
                            <span class="news-date">${news.date}</span>
                            <h3 class="news-card-title font-glech">${data.title}</h3>
                            <p class="news-desc">${data.summary}</p>
                            <button class="news-expand-btn">${btnText}</button>
                        </div>
                    </div>
                `;

                const summaryBtn = card.querySelector('.news-summary');
                const expandBtn = card.querySelector('.news-expand-btn');

                summaryBtn.addEventListener('click', () => {
                    // Populate modal
                    modalDate.textContent = news.date;
                    modalTitle.textContent = data.title;
                    modalContent.innerHTML = data.content;

                    // Open modal
                    newsModal.classList.add('open');
                    document.body.style.overflow = 'hidden'; // Prevent scrolling
                });

                container.appendChild(card);
            });

            // Close Modal Logic
            const closeModal = () => {
                newsModal.classList.remove('open');
                document.body.style.overflow = '';
                // Pequeño delay para limpiar el contenido tras la animación
                setTimeout(() => {
                    modalContent.innerHTML = '';
                }, 400);
            };

            newsModalClose.addEventListener('click', closeModal);
            newsModal.addEventListener('click', (e) => {
                if (e.target === newsModal) closeModal();
            });
        });
    </script>
</body>

</html>
